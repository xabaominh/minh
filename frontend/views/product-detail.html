<!-- ===== PRODUCT DETAIL VIEW ===== -->
<div class="product-detail-view" id="productDetailPage">
    <div class="product-detail-hero">
        <div class="product-detail-hero-text">
            <span class="product-detail-kicker">Chi tiết sản phẩm</span>
            <h1>Khám phá từng chi tiết</h1>
            <p>Xem ảnh, thông số và đánh giá từ khách hàng đã mua hàng.</p>
        </div>
        <div class="product-detail-hero-actions">
            <button type="button" class="mini-btn-outline" id="backToCollectionBtn">
                <i class="fas fa-arrow-left"></i> Quay lại bộ sưu tập
            </button>
        </div>
    </div>

    <div class="product-detail-page" id="productDetailContainer">
        <div class="loading-products">
            <div class="spinner-small"></div>
            <p>Đang tải thông tin sản phẩm...</p>
        </div>
    </div>
</div>
