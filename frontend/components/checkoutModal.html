<!-- ===== CHECKOUT MODAL COMPONENT ===== -->
<div class="auth-modal" id="checkoutModal">
    <div class="auth-content">
        <button class="close-auth" id="closeCheckoutBtn">&times;</button>
        <form id="checkoutForm" class="auth-form">
            <div class="auth-form-icon"><i class="fas fa-truck"></i></div>
            <h3>Xác Nhận Đặt Hàng</h3>
            <div class="checkout-summary">
                <p>Tổng cộng</p>
                <strong id="checkoutTotal">0 ₫</strong>
            </div>
            <div class="form-group">
                <label><i class="fas fa-map-marker-alt"></i> Địa chỉ giao hàng *</label>
                <select id="checkoutAddressSelect">
                    <option value="new">Thêm địa chỉ mới</option>
                </select>
            </div>
            <div class="checkout-address-list" id="checkoutAddressList"></div>
            <div class="checkout-new-address" id="checkoutNewAddress">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Người nhận</label>
                    <input type="text" id="checkoutReceiverName" placeholder="Tên người nhận">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-phone"></i> Số điện thoại</label>
                    <input type="tel" id="checkoutReceiverPhone" placeholder="0901234567">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-location-dot"></i> Địa chỉ mới *</label>
                    <input type="text" id="checkoutAddress" placeholder="Nhập địa chỉ nhận hàng">
                </div>
                <label class="checkout-default-option">
                    <input type="checkbox" id="saveNewAddressAsDefault" checked>
                    <span>Lưu và đặt làm địa chỉ mặc định</span>
                </label>
            </div>
            <div class="form-group">
                <label><i class="fas fa-credit-card"></i> Phương thức thanh toán</label>
                <select id="checkoutPayment">
                    <option value="COD">Thanh toán khi nhận hàng (COD)</option>
                    <option value="BANK_TRANSFER">Chuyển khoản ngân hàng</option>
                </select>
            </div>
            <!-- VietQR Preview khi chọn Chuyển khoản -->
            <div class="vietqr-preview" id="vietqrPreview" style="display: none;">
                <div class="vietqr-info-badge">
                    <i class="fas fa-info-circle"></i>
                    Mã QR thanh toán sẽ hiển thị sau khi bạn xác nhận đặt hàng
                </div>
            </div>
            <button type="submit" class="auth-submit-btn checkout-confirm-btn" id="confirmOrderBtn">
                <i class="fas fa-check-circle"></i> Xác Nhận Đặt Hàng
            </button>
        </form>
        <!-- VietQR Result — hiện sau khi đặt hàng thành công với Chuyển khoản -->
        <div class="vietqr-result" id="vietqrResult" style="display: none;">
            <div class="vietqr-result-header">
                <i class="fas fa-check-circle"></i>
                <h3>Đặt Hàng Thành Công!</h3>
                <p>Vui lòng quét mã QR bên dưới để thanh toán</p>
            </div>
            <div class="vietqr-order-info" id="vietqrOrderInfo"></div>
            <div class="vietqr-qr-wrapper">
                <img id="vietqrImage" src="" alt="VietQR Code">
            </div>
            <div class="vietqr-bank-details" id="vietqrBankDetails"></div>
            <p class="vietqr-note">
                <i class="fas fa-clock"></i> Đơn hàng sẽ được xử lý sau khi xác nhận thanh toán.
            </p>
            <button class="auth-submit-btn" id="vietqrCloseBtn" type="button">
                <i class="fas fa-times"></i> Đóng
            </button>
        </div>
    </div>
</div>
